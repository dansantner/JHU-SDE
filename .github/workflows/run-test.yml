name: HJB test.js (Linux)

on:
  push:
    paths:
      - 'HJB/test.js'
      - 'HJB/jumpengine.js'
      - '.github/workflows/run-test.yml'
  workflow_dispatch:   # also lets you trigger manually from the Actions tab

jobs:
  run-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: HJB

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: HJB/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run test.js
        run: node test.js

      - name: Upload chart_data.json
        uses: actions/upload-artifact@v4
        with:
          name: chart-data-linux
          path: HJB/chart_data.json
