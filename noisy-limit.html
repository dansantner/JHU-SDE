<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Noisy Limit Cycle</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const W = 600;
const H = 600;
const CX = W / 2;
const CY = H / 2;
const SCALE = 180;

function toScreen(x, y) {
  return [CX + x * SCALE, CY - y * SCALE];
}

function gaussianRandom() {
  let u, v, s;
  do {
    u = Math.random() * 2 - 1;
    v = Math.random() * 2 - 1;
    s = u * u + v * v;
  } while (s >= 1 || s === 0);
  return u * Math.sqrt(-2 * Math.log(s) / s);
}

function NoisyLimitCycle() {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const stateRef = useRef({ r: 0.1, theta: 0, points: [] });

  const [sigma, setSigma] = useState(0.15);
  const [omega, setOmega] = useState(2.0);
  const [running, setRunning] = useState(true);
  const [trailLen, setTrailLen] = useState(3000);

  const sigmaRef = useRef(sigma);
  const omegaRef = useRef(omega);
  const runningRef = useRef(running);
  const trailRef = useRef(trailLen);

  useEffect(() => { sigmaRef.current = sigma; }, [sigma]);
  useEffect(() => { omegaRef.current = omega; }, [omega]);
  useEffect(() => { runningRef.current = running; }, [running]);
  useEffect(() => { trailRef.current = trailLen; }, [trailLen]);

  const reset = useCallback(() => {
    stateRef.current = { r: 0.1, theta: 0, points: [] };
    const ctx = canvasRef.current?.getContext("2d");
    if (ctx) ctx.clearRect(0, 0, W, H);
  }, []);

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");

    const step = () => {
      if (runningRef.current) {
        const dt = 0.002;
        const s = stateRef.current;
        const sig = sigmaRef.current;
        const om = omegaRef.current;

        for (let i = 0; i < 8; i++) {
          const dW = Math.sqrt(dt) * gaussianRandom();
          const dr = s.r * (1 - s.r * s.r) * dt + sig * dW;
          s.r = Math.max(0.001, s.r + dr);
          s.theta += om * dt;
          const x = s.r * Math.cos(s.theta);
          const y = s.r * Math.sin(s.theta);
          s.points.push([x, y]);
        }

        const maxPts = trailRef.current;
        if (s.points.length > maxPts) {
          s.points = s.points.slice(s.points.length - maxPts);
        }
      }

      ctx.fillStyle = "#0a0a1a";
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = "rgba(255,255,255,0.06)";
      ctx.lineWidth = 1;
      for (let i = -2; i <= 2; i++) {
        const [sx, sy] = toScreen(i, -2);
        const [ex, ey] = toScreen(i, 2);
        ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
        const [sx2, sy2] = toScreen(-2, i);
        const [ex2, ey2] = toScreen(2, i);
        ctx.beginPath(); ctx.moveTo(sx2, sy2); ctx.lineTo(ex2, ey2); ctx.stroke();
      }

      ctx.strokeStyle = "rgba(255,255,255,0.2)";
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 6]);
      ctx.beginPath();
      ctx.arc(CX, CY, SCALE, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = "rgba(255,255,255,0.3)";
      ctx.font = "12px monospace";
      ctx.fillText("r = 1 (deterministic cycle)", CX + SCALE + 8, CY - 4);

      const pts = stateRef.current.points;
      if (pts.length > 1) {
        for (let i = 1; i < pts.length; i++) {
          const alpha = (i / pts.length) * 0.9;
          const hue = (i / pts.length) * 60 + 180;
          ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${alpha})`;
          ctx.lineWidth = 1.5;
          const [x0, y0] = toScreen(pts[i - 1][0], pts[i - 1][1]);
          const [x1, y1] = toScreen(pts[i][0], pts[i][1]);
          ctx.beginPath();
          ctx.moveTo(x0, y0);
          ctx.lineTo(x1, y1);
          ctx.stroke();
        }

        const last = pts[pts.length - 1];
        const [lx, ly] = toScreen(last[0], last[1]);
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(lx, ly, 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(255,255,255,0.6)";
        ctx.font = "13px monospace";
        ctx.fillText("r = " + stateRef.current.r.toFixed(3), 16, H - 16);
      }

      animRef.current = requestAnimationFrame(step);
    };

    animRef.current = requestAnimationFrame(step);
    return () => cancelAnimationFrame(animRef.current);
  }, []);

  return (
    <div style={{
      background: "#0a0a1a",
      minHeight: "100vh",
      display: "flex",
      flexDirection: "column",
      alignItems: "center",
      padding: "24px",
      fontFamily: "system-ui, sans-serif",
      color: "#e0e0e0"
    }}>
      <h2 style={{ margin: "0 0 4px", color: "#7dd3fc", fontWeight: 600 }}>
        Noisy Limit Cycle
      </h2>
      <p style={{ margin: "0 0 20px", color: "rgba(255,255,255,0.4)", fontSize: 14, fontFamily: "monospace" }}>
        dr = r(1−r²)dt + σ dW<sub>t</sub> &nbsp;|&nbsp; dθ = ω dt
      </p>

      <canvas
        ref={canvasRef}
        width={W}
        height={H}
        style={{ borderRadius: 8, border: "1px solid rgba(255,255,255,0.1)", maxWidth: "100%", height: "auto" }}
      />

      <div style={{
        marginTop: 20,
        display: "flex",
        gap: 32,
        flexWrap: "wrap",
        justifyContent: "center",
        alignItems: "flex-end"
      }}>
        <label style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 13, color: "rgba(255,255,255,0.5)" }}>
            noise σ = {sigma.toFixed(2)}
          </span>
          <input type="range" min="0" max="0.6" step="0.01" value={sigma}
            onChange={e => setSigma(+e.target.value)} style={{ width: 160 }} />
        </label>

        <label style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 13, color: "rgba(255,255,255,0.5)" }}>
            angular velocity ω = {omega.toFixed(1)}
          </span>
          <input type="range" min="0.5" max="6" step="0.1" value={omega}
            onChange={e => setOmega(+e.target.value)} style={{ width: 160 }} />
        </label>

        <label style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 13, color: "rgba(255,255,255,0.5)" }}>
            trail length
          </span>
          <input type="range" min="200" max="8000" step="100" value={trailLen}
            onChange={e => setTrailLen(+e.target.value)} style={{ width: 160 }} />
        </label>

        <button onClick={() => setRunning(r => !r)} style={{
          background: running ? "rgba(255,100,100,0.2)" : "rgba(100,255,100,0.2)",
          border: "1px solid rgba(255,255,255,0.2)", color: "#e0e0e0",
          padding: "8px 20px", borderRadius: 6, cursor: "pointer", fontSize: 14
        }}>{running ? "Pause" : "Play"}</button>

        <button onClick={reset} style={{
          background: "rgba(255,255,255,0.08)",
          border: "1px solid rgba(255,255,255,0.2)", color: "#e0e0e0",
          padding: "8px 20px", borderRadius: 6, cursor: "pointer", fontSize: 14
        }}>Reset</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<NoisyLimitCycle />);
</script>
</body>
</html>
